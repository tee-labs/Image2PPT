<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recta · 图片转 PPT</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="description"
      content="Recta — 把幻灯片截图或 PDF 重建为可编辑 PowerPoint。VLM 驱动，几分钟出图。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Distinctive type stack:
         - Instrument Serif for the wordmark / hero (editorial flair)
         - Geist for body (modern, refined, not Inter)
         - JetBrains Mono for code/IDs/numbers -->
    <!-- Inter (matches getoken.tech) + JetBrains Mono for code/IDs.
         No serif body or italic display — we drop Instrument Serif. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
